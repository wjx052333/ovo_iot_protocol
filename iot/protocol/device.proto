syntax = "proto3";
package device;

message VideoMsg {
  int64    id         = 1;
  float32  length     = 2;
  int64    start_time = 3;
  int64    end_time   = 4;
}
enum EventType {
  EVENT_TYPE_UND    = 0;
  EVENT_TYPE_MOVING = 1;
}
message EventMsg {
  EventType type   = 1;
  int64  timestamp = 2;
  VideoMsg  video  = 3;
}

// 上行：心跳
message Heartbeat {
  string device_id = 1;
  int64  timestamp = 2;
}

// 上行：状态上报
message StatusReport {
  string device_id  = 1;
  bool   streaming  = 2;
  string room_id    = 3;
  int32  signal_dbm = 4;
}

// 下行：指令
message UploadLogs {
  string upload_url = 1;  // URL where device should upload logs
}

message JoinRoom {
  string room_id     = 1;
  string livekit_url = 2;
  string token       = 3;
}

message LeaveRoom {
  string room_id = 1;
}

message QueryEvent {
  int64  start_time = 1;
  int64  end_time   = 2;
}

message Command {
  oneof payload {
    JoinRoom  join_room  = 1;
    LeaveRoom leave_room = 2;
    UploadLogs upload_logs = 3;
    QueryEvent query_event = 4;
  }
}

// 上行：指令结果
enum CmdResult {
  CMD_RESULT_OK   = 0;
  CMD_RESULT_BUSY = 1;
}

message JoinRoomResp {
  CmdResult result = 1;
  string    reason = 2;
}

message LeaveRoomResp {
  CmdResult result = 1;
  string    reason = 2;
}

message UploadLogsResp {
  CmdResult result = 1;
  string    reason = 2;
}

message QueryEventResp {
  repeated EventMsg msg_list = 1;
}

message CommandResponse {
  string device_id = 1;
  oneof payload {
    JoinRoomResp   join_room   = 2;
    LeaveRoomResp  leave_room  = 3;
    UploadLogsResp upload_logs = 4;
    QueryEventResp query_event = 5;
  }
}

enum PtzAction {
  PTZ_ACTION_UNSPECIFIED = 0;
  PTZ_ACTION_MOVE = 1;  // 开始移动
  PTZ_ACTION_STOP = 2;  // 停止移动
}

enum PtzDirection {
  PTZ_DIR_UNSPECIFIED = 0;
  PTZ_DIR_UP = 1;
  PTZ_DIR_DOWN = 2;
  PTZ_DIR_LEFT = 3;
  PTZ_DIR_RIGHT = 4;
  PTZ_DIR_UP_LEFT = 5;
  // ... 其他方向
}

message PtzControl {
  PtzAction action = 1;
  PtzDirection direction = 2; // 当 action 为 MOVE 时有效
  int32 speed = 3;            // 移动速度，例如 1-10
}

enum ChatAction {
  CHAT_ACTION_UNSPECIFIED = 0;
  CHAT_ACTION_LIVEKIT = 1;  // 接入Livekit
}
message ChatRequest {
  ChatAction action = 1; 
}

message CronRequest {
  string message = 1;
}

message AgentRequest {
  oneof payload {
    ChatRequest chat = 2;
    CronRequest cron = 3;
  }
}

enum AgentRespCode {
  AGENT_RESP_OK      = 0;
  AGENT_RESP_BUSY    = 1;
}

message ChatResponse {
  AgentRespCode result      = 1;
  string        room_id     = 2;
  string        livekit_url = 3;
  string        token       = 4;
}

message CronResponse {
  AgentRespCode result = 1;
}

message AgentResponse {
  oneof payload {
    ChatResponse chat = 2;
    CronResponse cron = 3;
  }
}
